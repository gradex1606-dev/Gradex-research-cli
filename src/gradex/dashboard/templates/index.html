<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gradex dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #58a6ff;
      letter-spacing: 1px;
    }
    #run-meta {
      font-size: 12px;
      color: #8b949e;
    }
    #run-meta .val { color: #e6edf3; margin-left: 4px; }

    /* ── Panels ──────────────────────────────────────────────────────────── */
    .panel {
      margin: 14px 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }
    .panel-title {
      background: #161b22;
      padding: 7px 14px;
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #30363d;
    }

    /* ── Table ───────────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #161b22;
      color: #8b949e;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #30363d;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #161b22; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .s-pending  { background: #6e7681; color: #fff; }
    .s-running  { background: #d29922; color: #fff; }
    .s-passed   { background: #3fb950; color: #fff; }
    .s-failed   { background: #f85149; color: #fff; }
    .s-rejected { background: #8b949e; color: #fff; }

    .pos { color: #3fb950; }
    .neg { color: #f85149; }
    .muted { color: #8b949e; }

    /* ── Chart ───────────────────────────────────────────────────────────── */
    #chart-wrap { padding: 14px 16px; height: 220px; }

    /* ── Log ─────────────────────────────────────────────────────────────── */
    #log-panel {
      height: 150px;
      overflow-y: auto;
      padding: 10px 14px;
      background: #010409;
      font-size: 11px;
      line-height: 1.7;
    }
    .log-line { color: #8b949e; white-space: pre-wrap; word-break: break-all; }
    .log-line::before { content: '▸ '; color: #58a6ff; }

    /* ── Analytics cards ────────────────────────────────────────────────── */
    .metric-card {
      background: #0d1117;
      border: 0.5px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .metric-label {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .metric-value {
      font-size: 20px;
      font-weight: 500;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
    }

    /* ── WS pill ─────────────────────────────────────────────────────────── */
    #ws-pill {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 8px;
      background: #161b22;
      border: 1px solid #30363d;
    }
    #ws-pill.on  { color: #3fb950; border-color: #3fb950; }
    #ws-pill.off { color: #f85149; border-color: #f85149; }
  </style>
</head>
<body>

<!-- ── Panel 1: Header ───────────────────────────────────────────────────── -->
<div id="header">
  <span class="logo">gradex dashboard</span>
  <span id="run-meta">No active run</span>
</div>

<!-- ── Panel 2: Experiment table ─────────────────────────────────────────── -->
<div class="panel">
  <div class="panel-title">Experiments</div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Score</th>
        <th>&#916; Baseline</th>
        <th>Gate</th>
      </tr>
    </thead>
    <tbody id="exp-body"></tbody>
  </table>
</div>

<!-- ── Analytics panel ───────────────────────────────────────────────────── -->
<section id="analytics-panel" style="display:none; margin: 14px 16px; padding: 16px;
  background: var(--bg2, #161b22); border-radius: 8px;
  border: 0.5px solid #30363d;">
  <div style="font-size:11px; letter-spacing:1px; color:#8b949e;
    margin-bottom:14px;">ANALYTICS</div>

  <!-- 4 metric cards in a row -->
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    margin-bottom:16px;">
    <div class="metric-card">
      <div class="metric-label">Pass rate</div>
      <div class="metric-value" id="stat-pass-rate">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Improvement</div>
      <div class="metric-value" id="stat-improvement">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Best score</div>
      <div class="metric-value" id="stat-best">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Duration</div>
      <div class="metric-value" id="stat-duration">—</div>
    </div>
  </div>

  <!-- Breakdown bar -->
  <div style="margin-bottom: 8px; font-size: 12px; color: #8b949e;">
    Experiments breakdown
  </div>
  <div style="display:flex; height:8px; border-radius:4px; overflow:hidden;
    background:#21262d;">
    <div id="bar-passed" style="background:#3fb950; height:100%;
      transition:width 0.4s;"></div>
    <div id="bar-rejected" style="background:#f85149; height:100%;
      transition:width 0.4s;"></div>
    <div id="bar-failed" style="background:#6e7681; height:100%;
      transition:width 0.4s;"></div>
  </div>
  <div style="display:flex; gap:16px; margin-top:6px; font-size:11px;
    color:#8b949e;">
    <span><span style="color:#3fb950;">&#9632;</span>
      Passed <span id="bar-label-passed">0</span></span>
    <span><span style="color:#f85149;">&#9632;</span>
      Rejected <span id="bar-label-rejected">0</span></span>
    <span><span style="color:#6e7681;">&#9632;</span>
      Failed <span id="bar-label-failed">0</span></span>
  </div>
</section>

<!-- ── Panel 3: Chart + log ──────────────────────────────────────────────── -->
<div class="panel">
  <div class="panel-title">Score chart &mdash; passed experiments</div>
  <div id="chart-wrap">
    <canvas id="score-chart"></canvas>
  </div>
  <div class="panel-title">Trace log</div>
  <div id="log-panel"></div>
</div>

<div id="ws-pill" class="off">&#9679; disconnected</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  runId: null,
  baseline: null,
  direction: 'higher',
  chartLabels: [],
  chartScores: [],
  logLines: [],
};

// ── Chart ──────────────────────────────────────────────────────────────────
const chartCtx = document.getElementById('score-chart').getContext('2d');
const chart = new Chart(chartCtx, {
  type: 'line',
  data: {
    labels: state.chartLabels,
    datasets: [{
      label: 'Score',
      data: state.chartScores,
      borderColor: '#58a6ff',
      backgroundColor: 'rgba(88,166,255,0.08)',
      tension: 0.3,
      pointBackgroundColor: '#58a6ff',
      pointRadius: 4,
    }],
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 250 },
    scales: {
      x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
      y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
    },
    plugins: { legend: { labels: { color: '#e6edf3', font: { family: "'Courier New'" } } } },
  },
});

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function badge(status) {
  return `<span class="badge s-${status}">${status}</span>`;
}

function fmt(v) {
  return (v !== null && v !== undefined) ? Number(v).toFixed(4) : '<span class="muted">&mdash;</span>';
}

function delta(score) {
  if (score === null || score === undefined || state.baseline === null) {
    return '<span class="muted">&mdash;</span>';
  }
  const d = score - state.baseline;
  const better = state.direction === 'higher' ? d > 0 : d < 0;
  const cls = better ? 'pos' : 'neg';
  const sign = d >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${d.toFixed(4)}</span>`;
}

function gate(v) {
  if (v === null || v === undefined) return '<span class="muted">&mdash;</span>';
  return v
    ? '<span class="pos">&#10004;</span>'
    : '<span class="neg">&#10008;</span>';
}

// ── Table ──────────────────────────────────────────────────────────────────
function upsertRow(e) {
  const tbody = document.getElementById('exp-body');
  const rowId = 'row-' + e.id;
  let tr = document.getElementById(rowId);
  const cells = `
    <td>${esc(e.id.substring(0, 8))}</td>
    <td>${badge(e.status)}</td>
    <td>${fmt(e.score)}</td>
    <td>${delta(e.score)}</td>
    <td>${gate(e.gate_passed)}</td>
  `;
  if (!tr) {
    tr = document.createElement('tr');
    tr.id = rowId;
    tbody.insertBefore(tr, tbody.firstChild);
  }
  tr.innerHTML = cells;
}

function refreshRunMeta() {
  const el = document.getElementById('run-meta');
  if (!state.runId) { el.innerHTML = 'No active run'; return; }
  el.innerHTML =
    `Run: <span class="val">${state.runId.substring(0, 8)}</span>` +
    `&nbsp;&nbsp;Baseline: <span class="val">${state.baseline !== null ? Number(state.baseline).toFixed(4) : '&mdash;'}</span>`;
}

// ── Log ────────────────────────────────────────────────────────────────────
function appendLog(msg) {
  state.logLines.push(msg);
  if (state.logLines.length > 20) state.logLines.shift();
  const panel = document.getElementById('log-panel');
  panel.innerHTML = state.logLines
    .map(l => `<div class="log-line">${esc(l)}</div>`)
    .join('');
  panel.scrollTop = panel.scrollHeight;
}

// ── Initial state ──────────────────────────────────────────────────────────
function renderInitial(data) {
  if (data.run) {
    state.runId    = data.run.id;
    state.baseline = data.run.baseline_score;
    state.direction = data.run.metric_direction;
  }
  refreshRunMeta();
  (data.experiments || []).forEach(e => {
    upsertRow(e);
    if (e.status === 'passed' && e.score !== null) {
      state.chartLabels.push(e.id.substring(0, 8));
      state.chartScores.push(e.score);
    }
  });
  chart.update();
  refreshAnalytics(state.runId);
}

// ── Event handler ──────────────────────────────────────────────────────────
function onEvent(ev) {
  if (ev.type === 'experiment_update') {
    upsertRow(ev.data);
  } else if (ev.type === 'round_complete') {
    if (ev.best_score !== undefined) {
      state.chartLabels.push('#' + (state.chartLabels.length + 1));
      state.chartScores.push(ev.best_score);
      chart.update();
    }
    refreshAnalytics(state.runId);
  } else if (ev.type === 'log') {
    appendLog(ev.msg);
  }
}

// ── Analytics ──────────────────────────────────────────────────────────────
async function refreshAnalytics(runId) {
  if (!runId) return;
  try {
    const resp = await fetch(`/api/analytics/${runId}`);
    const data = await resp.json();
    if (data.error) return;

    const s = data.summary;
    document.getElementById('analytics-panel').style.display = 'block';

    // Metric cards
    document.getElementById('stat-pass-rate').textContent =
      s.breakdown.pass_rate + '%';
    document.getElementById('stat-improvement').textContent =
      s.improvement_pct !== null
        ? (s.improvement_pct > 0 ? '+' : '') + s.improvement_pct + '%'
        : '—';
    document.getElementById('stat-best').textContent =
      s.best_score !== null ? Number(s.best_score).toFixed(4) : '—';
    document.getElementById('stat-duration').textContent =
      s.duration_seconds > 0 ? s.duration_seconds.toFixed(0) + 's' : '—';

    // Breakdown bar
    const total = Math.max(s.breakdown.total, 1);
    document.getElementById('bar-passed').style.width =
      (s.breakdown.passed / total * 100) + '%';
    document.getElementById('bar-rejected').style.width =
      (s.breakdown.rejected / total * 100) + '%';
    document.getElementById('bar-failed').style.width =
      (s.breakdown.failed / total * 100) + '%';
    document.getElementById('bar-label-passed').textContent = s.breakdown.passed;
    document.getElementById('bar-label-rejected').textContent = s.breakdown.rejected;
    document.getElementById('bar-label-failed').textContent = s.breakdown.failed;
  } catch (err) {
    console.error('refreshAnalytics error', err);
  }
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const pill = document.getElementById('ws-pill');
  const ws = new WebSocket(`ws://${window.location.host}/ws`);

  ws.onopen = () => {
    pill.textContent = '\u25cf connected';
    pill.className = 'on';
    fetch('/api/status')
      .then(r => r.json())
      .then(renderInitial)
      .catch(console.error);
  };

  ws.onmessage = (e) => {
    try { onEvent(JSON.parse(e.data)); } catch (err) { console.error(err); }
  };

  ws.onerror = (e) => console.error('ws error', e);

  ws.onclose = () => {
    pill.textContent = '\u25cf disconnected';
    pill.className = 'off';
    setTimeout(connect, 3000);   // reconnect after 3 s
  };
}

connect();
</script>
</body>
</html>
